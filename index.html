<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>HR Project Portal</title>
  <link rel="icon" type="image/png" href="/HR/department.png">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #f7f8fc;
    }

    .portal-error {
      display: none;
      min-height: 100%;
      place-items: center;
      padding: 28px;
      box-sizing: border-box;
      color: #252763;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="portal-error" id="portalError" role="alert">
    The portal could not be opened. Please refresh the page.
  </div>

  <script>
    /*
      LOADER for the HR Project Portal.

      This file — and its identical twin 404.html — fetches the portal in
      two pieces and renders them in place:

        • portal-config.js — THE CONTENT (departments, Smartsheet links,
          projects, FAQs). This is the file you edit day to day. It is
          fetched fresh on every page load, so a saved edit is live
          immediately — NO version bump needed.

        • portal.html — the shell (layout and behavior). This file is
          cached between version bumps so revisiting and switching
          departments stays fast.

      Clean URLs keep working on GitHub Pages because GitHub serves
      404.html for any path that is not a real file, and this loader
      renders the portal there too.

      ONLY WHEN YOU EDIT portal.html (rare, structural changes): bump the
      ?v= number in PORTAL_URL below — in BOTH index.html and 404.html —
      so every browser fetches the fresh copy on the next load.
    */
    (async function () {
      "use strict";

      const PORTAL_URL = "/HR/portal.html?v=20260706-1";
      const CONFIG_URL = "/HR/portal-config.js";

      try {
        const [portalResponse, configResponse] = await Promise.all([
          fetch(PORTAL_URL),
          /* "no-cache" means: always check with the server whether
             portal-config.js changed, so content edits show up on the
             very next load (unchanged copies still answer quickly). */
          fetch(CONFIG_URL, { cache: "no-cache" })
        ]);

        if (!portalResponse.ok) {
          throw new Error("The portal content could not be loaded (" + portalResponse.status + ").");
        }

        const html = await portalResponse.text();

        // Basic sanity check that we received the real portal and not, for
        // example, an error page returned with a 200 status.
        if (!html.includes("__hrPortalBooted") || !html.includes("</html>")) {
          throw new Error("The portal content did not look valid.");
        }

        /* Run the content file first so window.HR_PORTAL_DATA exists by
           the time the portal boots. A typo in portal-config.js is
           recorded instead of thrown, so the portal can still render its
           friendly "fix your last edit" recovery message. */
        try {
          if (!configResponse.ok) {
            throw new Error("portal-config.js could not be loaded (" + configResponse.status + ").");
          }
          const configSource = await configResponse.text();
          new Function(configSource)();
          if (!window.HR_PORTAL_DATA) {
            throw new Error("portal-config.js ran but did not set window.HR_PORTAL_DATA.");
          }
        } catch (configError) {
          console.error(configError);
          window.__hrPortalConfigError = String(configError);
        }

        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        console.error(error);
        const errorMessage = document.getElementById("portalError");
        if (errorMessage) {
          errorMessage.style.display = "grid";
        }
      }
    })();
  </script>
</body>
</html>
