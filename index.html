<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Opening HR Project Portal…</title>
  <link rel="icon" type="image/png" href="/HR/department.png">
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      display: grid;
      place-items: center;
      background: #252763;
      color: #ffffff;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    .portal-loading { text-align: center; padding: 28px; }
    .portal-loading strong { display: block; margin-bottom: 7px; font-size: 20px; }
    .portal-loading span { color: rgba(255,255,255,.78); font-size: 14px; }
  </style>
</head>
<body>
  <div class="portal-loading" role="status" aria-live="polite">
    <strong>Opening the HR Project Portal</strong>
    <span>Loading the portal…</span>
  </div>

  <script src="/HR/assets/portal-data-01.js"></script>
  <script src="/HR/assets/portal-data-02.js"></script>
  <script src="/HR/assets/portal-data-03.js"></script>
  <script src="/HR/assets/portal-data-04.js"></script>
  <script src="/HR/assets/portal-data-05.js"></script>
  <script src="/HR/assets/portal-data-06.js"></script>
  <script>
    (async function () {
      "use strict";

      try {
        const chunks = window.__HR_PORTAL_GZIP_CHUNKS__ || [];
        if (chunks.length !== 6) {
          throw new Error("The portal data did not load completely.");
        }
        if (typeof DecompressionStream !== "function") {
          throw new Error("This browser does not support portal decompression.");
        }

        const compressedPortal = chunks.join("");
        const binary = atob(compressedPortal);
        const bytes = new Uint8Array(binary.length);

        for (let index = 0; index < binary.length; index += 1) {
          bytes[index] = binary.charCodeAt(index);
        }

        const stream = new Blob([bytes])
          .stream()
          .pipeThrough(new DecompressionStream("gzip"));

        let html = await new Response(stream).text();

        // Keep the friendly HRCM name everywhere, including the All Projects group.
        html = html.replaceAll('"HR Change Management",', '"HRCM",');
        html = html.replaceAll('>HR Change Management</a>', '>HRCM</a>');

        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        console.error(error);
        document.body.innerHTML = '<div class="portal-loading"><strong>The portal could not be opened.</strong><span>Please refresh the page or contact the portal owner.</span></div>';
      }
    })();
  </script>
</body>
</html>
