<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Opening HR Project Portal…</title>
  <link rel="icon" type="image/png" href="/HR/department.png">
  <style>
    html, body { height: 100%; margin: 0; }
    body {
      display: grid;
      place-items: center;
      background: #252763;
      color: #fff;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }
    .loading { text-align: center; padding: 28px; }
    .loading strong { display: block; font-size: 20px; margin-bottom: 7px; }
    .loading span { color: rgba(255,255,255,.78); font-size: 14px; }
  </style>
</head>
<body>
  <div class="loading" role="status" aria-live="polite">
    <strong>Opening the HR Project Portal</strong>
    <span>Loading your portal configuration…</span>
  </div>
  <script>
    (async function () {
      "use strict";

      const HR_SHAREPOINT = "https://swgas.sharepoint.com/sites/HR";
      const replacements = new Map([
        ["INSERT_ALBERT_TAYLOR_SHAREPOINT_URL_HERE", HR_SHAREPOINT],
        ["INSERT_GAIL_CARMONA_SHAREPOINT_URL_HERE", HR_SHAREPOINT],
        ["INSERT_MIKE_BRYANT_SHAREPOINT_URL_HERE", HR_SHAREPOINT],
        ["INSERT_COURTNEY_MOORE_SHAREPOINT_URL_HERE", HR_SHAREPOINT],

        ["INSERT_GAIL_CARMONA_HOME_DASHBOARD_PUBLISHED_LINK_HERE", "https://app.smartsheet.com/b/publish?EQBCT=89905a5832ba4935b09e46adb96e5842"],
        ["INSERT_GAIL_CARMONA_MAIN_INITIATIVES_PUBLISHED_LINK_HERE", "https://app.smartsheet.com/b/publish?EQBCT=e9aa2f05ffe34f69925a84b306922fc3"],
        ["INSERT_GAIL_CARMONA_ALL_PROJECTS_PUBLISHED_LINK_HERE", "https://app.smartsheet.com/b/publish?EQBCT=8dfe65d12d204a36b2380172a8cc9c7b"],

        ["INSERT_MIKE_BRYANT_HOME_DASHBOARD_PUBLISHED_LINK_HERE", "https://app.smartsheet.com/b/publish?EQBCT=7c519e87f82b480ab66ec680ab74068c"],
        ["INSERT_MIKE_BRYANT_MAIN_INITIATIVES_PUBLISHED_LINK_HERE", "https://app.smartsheet.com/b/publish?EQBCT=7c62e92983d04df4b556b375116110a7"],
        ["INSERT_MIKE_BRYANT_ALL_PROJECTS_PUBLISHED_LINK_HERE", "https://app.smartsheet.com/b/publish?EQBCT=b475dcf41ebc4fa6a330e982f1d0fdeb"],

        ["INSERT_COURTNEY_MOORE_HOME_DASHBOARD_PUBLISHED_LINK_HERE", "https://app.smartsheet.com/b/publish?EQBCT=3a13a5699eeb4bc69171db1144cd3ebb"],
        ["INSERT_COURTNEY_MOORE_MAIN_INITIATIVES_PUBLISHED_LINK_HERE", "https://app.smartsheet.com/b/publish?EQBCT=efbcd2919ddf49038b9a653e124ffba8"],
        ["INSERT_COURTNEY_MOORE_ALL_PROJECTS_PUBLISHED_LINK_HERE", "https://app.smartsheet.com/b/publish?EQBCT=bf3834f629ec49d99eb373e5d016138a"]
      ]);

      const oldAlbertViews = `        views: {
          home: {
            label: "Main Initiatives",
            embedSrc: "INSERT_ALBERT_TAYLOR_MAIN_INITIATIVES_PUBLISHED_LINK_HERE",
            viewOnlyNote: false,
            refreshNote: true,
            preload: true
          },
          mainInitiatives: {
            label: "(Department Name) Main Initiatives",
            sourceViewId: "home",
            showInNavigation: false
          },
          allDepartmentProjects: {
            label: "All (Department Name) Projects (View Only)",
            embedSrc: "INSERT_ALBERT_TAYLOR_ALL_PROJECTS_PUBLISHED_LINK_HERE",
            viewOnlyNote: true,
            refreshNote: false,
            preload: true
          }
        }`;

      const newAlbertViews = `        views: {
          home: {
            label: "Home",
            embedSrc: "https://app.smartsheet.com/b/publish?EQBCT=7d9f27cd03244d95b758b8093f3a90dd",
            viewOnlyNote: false,
            refreshNote: true,
            preload: true
          },
          mainInitiatives: {
            label: "All HR Projects Dashboard",
            embedSrc: "https://app.smartsheet.com/b/publish?EQBCT=51b6077469244ea4b04fc5ba07e52876",
            viewOnlyNote: false,
            refreshNote: true,
            preload: true
          },
          allDepartmentProjects: {
            label: "All HR Projects (View Only)",
            embedSrc: "https://app.smartsheet.com/b/publish?EQBCT=a8c8d9416f8a45079c62e3aefe2d73e4",
            viewOnlyNote: true,
            refreshNote: false,
            preload: true
          }
        }`;

      try {
        const response = await fetch("/HR/portal-base.html?v=20260624-1", { cache: "no-store" });
        if (!response.ok) throw new Error("Portal template could not be loaded.");

        let html = await response.text();
        for (const [placeholder, value] of replacements) {
          html = html.split(placeholder).join(value);
        }

        if (!html.includes(oldAlbertViews)) {
          throw new Error("Albert Taylor portal configuration was not found.");
        }
        html = html.replace(oldAlbertViews, newAlbertViews);

        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        document.body.innerHTML = '<div class="loading"><strong>The portal could not be opened.</strong><span>Please refresh the page or contact the portal owner.</span></div>';
        console.error(error);
      }
    })();
  </script>
</body>
</html>
