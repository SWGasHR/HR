<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>HR Project Portal</title>
  <link rel="icon" type="image/png" href="/HR/department.png">
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      background: #f7f8fc;
      color: #252763;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      overflow: hidden;
    }

    .portal-loading {
      position: fixed;
      top: 10px;
      left: 50%;
      z-index: 99999;
      display: inline-flex;
      align-items: center;
      gap: 9px;
      min-height: 34px;
      padding: 5px 13px 5px 9px;
      border: 1px solid rgba(37,39,99,0.12);
      border-radius: 999px;
      background: rgba(255,255,255,0.96);
      color: #252763;
      box-shadow: 0 7px 22px rgba(37,39,99,0.16);
      transform: translate(-50%, -10px);
      opacity: 0;
      transition: opacity 0.18s ease, transform 0.18s ease;
      animation: portalLoadingEnter 0.2s ease forwards;
      white-space: nowrap;
    }

    .portal-loading.is-leaving {
      opacity: 0;
      transform: translate(-50%, -10px);
    }

    .portal-loading-dot {
      width: 8px;
      height: 8px;
      flex: 0 0 8px;
      border-radius: 50%;
      background: #4f7fd8;
      box-shadow: 0 0 0 0 rgba(79,127,216,0.30);
      animation: portalLoadingPulse 1.05s ease-in-out infinite;
    }

    .portal-loading-text {
      font-size: 12px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: 0.05px;
    }

    @keyframes portalLoadingEnter {
      to {
        opacity: 1;
        transform: translate(-50%, 0);
      }
    }

    @keyframes portalLoadingPulse {
      0%, 100% {
        transform: scale(0.82);
        box-shadow: 0 0 0 0 rgba(79,127,216,0.30);
      }
      50% {
        transform: scale(1);
        box-shadow: 0 0 0 5px rgba(79,127,216,0);
      }
    }
  </style>
</head>
<body>
  <div class="portal-loading" id="portalLoadingMessage" role="status" aria-live="polite">
    <span class="portal-loading-dot" aria-hidden="true"></span>
    <span class="portal-loading-text">Opening HR Project Portal</span>
  </div>

  <script>
    (async function () {
      "use strict";

      const portalPolishCss = `
        <style id="portal-polish-overrides">
          .top-nav {
            padding-right: 8px !important;
          }

          .swgas-logo-link {
            position: relative !important;
            display: inline-flex !important;
            align-items: center !important;
            justify-content: center !important;
            height: 50px !important;
            padding: 4px 14px 4px 12px !important;
            margin-left: auto !important;
            margin-right: -5px !important;
            border-radius: 10px !important;
            box-sizing: border-box !important;
            overflow: visible !important;
            background: transparent !important;
            isolation: isolate;
          }

          .swgas-logo-link::before {
            content: "";
            position: absolute;
            z-index: 0;
            inset: -7px -10px;
            border-radius: 11px;
            background: rgba(255,255,255,0.14);
            opacity: 0;
            transition: opacity 0.18s ease, background-color 0.18s ease;
            pointer-events: none;
          }

          .swgas-logo-link:hover,
          .swgas-logo-link:focus {
            background: transparent !important;
            outline: none;
          }

          .swgas-logo-link:hover::before,
          .swgas-logo-link:focus::before {
            opacity: 1;
          }

          #departmentLogo {
            position: relative;
            z-index: 1;
            width: auto !important;
            height: 60px !important;
            max-width: 250px !important;
            max-height: 60px !important;
            object-fit: contain !important;
            transform-origin: center right;
          }

          #departmentLogo[src$="swgas-ex.png"],
          #departmentLogo[src$="swgas-hrbp.png"],
          #departmentLogo[src$="swgas-hrcm.png"],
          #departmentLogo[src$="swgas-hrs.png"],
          #departmentLogo[src$="swgas-hrss.png"],
          #departmentLogo[src$="swgas-labor-relations.png"],
          #departmentLogo[src$="swgas-ta.png"],
          #departmentLogo[src$="swgas-td.png"] {
            transform: scale(1.14);
          }

          .nav-reminder-slot,
          .top-nav.reminder-visible .nav-reminder-slot {
            min-width: 0 !important;
            max-width: none !important;
            padding: 0 !important;
            overflow: visible !important;
          }

          .nav-refresh-popover {
            width: auto !important;
            max-width: 100% !important;
            min-width: 0 !important;
            min-height: 30px !important;
            height: auto !important;
            padding: 5px 25px 5px 12px !important;
            flex: 0 0 auto !important;
            white-space: nowrap !important;
          }

          .nav-refresh-text {
            width: auto !important;
            white-space: nowrap !important;
          }

          .nav-project-action {
            width: auto !important;
            max-width: 100% !important;
            min-width: 0 !important;
            min-height: 34px !important;
            height: auto !important;
            padding: 5px 30px 5px 8px !important;
            gap: 7px !important;
            flex: 0 0 auto !important;
          }

          .nav-project-action-copy {
            flex: 0 1 auto !important;
            overflow: visible !important;
          }

          .nav-project-action-icon {
            width: 26px !important;
            height: 26px !important;
            flex: 0 0 26px !important;
            border-radius: 8px !important;
          }

          .nav-project-action-arrow {
            right: 8px !important;
            width: 16px !important;
            height: 16px !important;
          }

          .portal-route-transition {
            position: fixed;
            top: 10px;
            left: 50%;
            z-index: 100000;
            display: inline-flex;
            align-items: center;
            gap: 9px;
            min-height: 34px;
            padding: 5px 13px 5px 9px;
            border: 1px solid rgba(37,39,99,0.12);
            border-radius: 999px;
            background: rgba(255,255,255,0.97);
            color: #252763;
            box-shadow: 0 7px 22px rgba(37,39,99,0.16);
            transform: translate(-50%, -10px);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.18s ease, transform 0.18s ease;
            white-space: nowrap;
          }

          .portal-route-transition.is-visible {
            opacity: 1;
            transform: translate(-50%, 0);
          }

          .portal-route-transition-dot {
            width: 8px;
            height: 8px;
            flex: 0 0 8px;
            border-radius: 50%;
            background: #4f7fd8;
          }

          .portal-route-transition-text {
            font-size: 12px;
            line-height: 1;
            font-weight: 700;
          }
        </style>`;

      const portalEnhancementScript = `
        <script id="portal-navigation-polish">
          (function () {
            "use strict";

            const topNav = document.querySelector(".top-nav");
            const reminderSlot = document.getElementById("navReminderSlot");
            const logoLink = document.getElementById("departmentSharePointLink");
            const supportDropdown = Array.from(document.querySelectorAll(".dropdown")).find(function(dropdown) {
              const toggle = dropdown.querySelector(".dropdown-toggle");
              return toggle && toggle.textContent.trim().startsWith("Support");
            });

            function alignReminderSlot() {
              if (!topNav || !reminderSlot || !logoLink || !supportDropdown) {
                return;
              }

              const navRect = topNav.getBoundingClientRect();
              const supportRect = supportDropdown.getBoundingClientRect();
              const logoRect = logoLink.getBoundingClientRect();
              const gap = 6;

              const left = Math.max(0, supportRect.right - navRect.left + gap);
              const right = Math.max(0, navRect.right - logoRect.left + gap);

              reminderSlot.style.position = "absolute";
              reminderSlot.style.left = left + "px";
              reminderSlot.style.right = right + "px";
              reminderSlot.style.width = "auto";
              reminderSlot.style.padding = "0";
              reminderSlot.style.margin = "0";
              reminderSlot.style.justifyItems = "center";
              reminderSlot.style.alignItems = "center";
              reminderSlot.style.zIndex = "25";
              reminderSlot.style.display = reminderSlot.classList.contains("collapsed") ? "none" : "grid";
            }

            function createRouteTransition() {
              let transition = document.getElementById("portalRouteTransition");

              if (transition) {
                return transition;
              }

              transition = document.createElement("div");
              transition.id = "portalRouteTransition";
              transition.className = "portal-route-transition";
              transition.setAttribute("role", "status");
              transition.setAttribute("aria-live", "polite");
              transition.innerHTML =
                '<span class="portal-route-transition-dot" aria-hidden="true"></span>' +
                '<span class="portal-route-transition-text">Opening HR Project Portal</span>';
              document.body.appendChild(transition);

              return transition;
            }

            document.addEventListener("click", function (event) {
              const link = event.target.closest("a[data-department-key]");

              if (
                !link ||
                event.defaultPrevented ||
                event.button !== 0 ||
                event.metaKey ||
                event.ctrlKey ||
                event.shiftKey ||
                event.altKey ||
                link.target === "_blank"
              ) {
                return;
              }

              const destination = link.href;

              if (!destination || destination === window.location.href) {
                return;
              }

              event.preventDefault();

              const transition = createRouteTransition();
              requestAnimationFrame(function () {
                transition.classList.add("is-visible");
              });

              setTimeout(function () {
                window.location.href = destination;
              }, 150);
            });

            if (reminderSlot) {
              new MutationObserver(alignReminderSlot).observe(reminderSlot, {
                attributes: true,
                attributeFilter: ["class"],
                subtree: true
              });
            }

            window.addEventListener("resize", alignReminderSlot);
            window.addEventListener("load", alignReminderSlot);
            requestAnimationFrame(alignReminderSlot);
            setTimeout(alignReminderSlot, 100);
            setTimeout(alignReminderSlot, 500);
          })();
        <\/script>`;

      const improvedPreloadFunction = `    function startPreloadingEmbeddedLinks(activeRoute) {
      if (preloadStarted) {
        return;
      }

      preloadStarted = true;

      const activeKey = activeRoute ? routeKey(activeRoute) : "";
      const activeIframeRecord = activeKey ? iframeRegistry[activeKey] : null;
      const routesToPreload = getAllEmbeddableRoutes().filter(function(route) {
        const embedData = getEmbedDataForRoute(route);

        return (
          routeKey(route) !== activeKey &&
          embedData &&
          !isPlaceholderLink(embedData.embedSrc)
        );
      });

      let routeIndex = 0;
      let preloadQueueStarted = false;
      let activeViewFallbackTimer = null;

      function preloadNextRoute() {
        if (routeIndex >= routesToPreload.length) {
          return;
        }

        getOrCreateIframeForRoute(routesToPreload[routeIndex]);
        routeIndex += 1;
        setTimeout(preloadNextRoute, PRELOAD_STAGGER_MS);
      }

      function beginPreloadQueue() {
        if (preloadQueueStarted) {
          return;
        }

        preloadQueueStarted = true;

        if (activeViewFallbackTimer) {
          clearTimeout(activeViewFallbackTimer);
          activeViewFallbackTimer = null;
        }

        setTimeout(preloadNextRoute, PRELOAD_START_DELAY_MS);
      }

      if (!activeIframeRecord || activeIframeRecord.isLoaded) {
        beginPreloadQueue();
        return;
      }

      activeIframeRecord.frame.addEventListener("load", beginPreloadQueue, { once: true });
      activeViewFallbackTimer = setTimeout(beginPreloadQueue, PRELOAD_ACTIVE_VIEW_FALLBACK_MS);
    }

`;

      try {
        const response = await fetch("/HR/images/portal.html?v=20260624-5", { cache: "no-store" });

        if (!response.ok) {
          throw new Error("The portal content could not be loaded.");
        }

        let html = await response.text();

        html = html.replaceAll('logoFileName: "swgas-', 'logoFileName: "images/swgas-');
        html = html.replaceAll('src="swgas-', 'src="images/swgas-');
        html = html.replaceAll('embedSrc: "INSERT_LINK_HERE", visible: true', 'embedSrc: "INSERT_LINK_HERE", visible: false');
        html = html.replaceAll("HR Change Management", "HRCM");

        html = html.replace(
          'const PRELOAD_START_DELAY_MS = 900;\n    const PRELOAD_STAGGER_MS = 250;',
          'const PRELOAD_START_DELAY_MS = 650;\n    const PRELOAD_ACTIVE_VIEW_FALLBACK_MS = 10000;\n    const PRELOAD_STAGGER_MS = 1200;'
        );

        html = html.replace(
          /    function startPreloadingEmbeddedLinks\(activeRoute\) \{[\s\S]*?\n    \}\n\n    function notePossibleIframeInteraction/,
          improvedPreloadFunction + "    function notePossibleIframeInteraction"
        );

        html = html.replace("</head>", portalPolishCss + "\n</head>");
        html = html.replace("</body>", portalEnhancementScript + "\n</body>");

        if (
          !html.includes('images/swgas-benefits.png') ||
          !html.includes('departmentName: "HRCM"') ||
          !html.includes("portal-navigation-polish")
        ) {
          throw new Error("The portal content did not initialize correctly.");
        }

        const loadingMessage = document.getElementById("portalLoadingMessage");

        if (loadingMessage) {
          loadingMessage.classList.add("is-leaving");
          await new Promise(function (resolve) {
            setTimeout(resolve, 150);
          });
        }

        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        console.error(error);
        document.body.innerHTML =
          '<div class="portal-loading" style="opacity:1;transform:translate(-50%,0)">' +
          '<span class="portal-loading-dot" aria-hidden="true"></span>' +
          '<span class="portal-loading-text">The portal could not be opened. Please refresh the page.</span>' +
          "</div>";
      }
    })();
  </script>
</body>
</html>
