name: Restore direct HR portal index

on:
  push:
    paths:
      - .portal-direct-update-trigger

permissions:
  contents: write

jobs:
  restore-direct-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore and update index.html directly
        shell: python
        run: |
          from pathlib import Path

          trigger = Path('.portal-direct-update-trigger')
          if not trigger.exists():
              print('No update trigger is present; nothing to do.')
              raise SystemExit(0)

          source = Path('portal-base.html')
          destination = Path('index.html')
          if not source.exists():
              raise RuntimeError('portal-base.html is missing.')

          text = source.read_text(encoding='utf-8')

          configs = {
              'albert-taylor': '''      "albert-taylor": {
                portalType: "leader",
                departmentName: "HR",
                portalTitle: "HR Project Portal",
                projectGroupLabels: [
                  "Benefits",
                  "Compensation",
                  "DE&I",
                  "Employee Experience",
                  "HRBP",
                  "HR Change Management",
                  "HRS",
                  "HRSS",
                  "Labor Relations",
                  "Talent Acquisition",
                  "Talent Development"
                ],
                logoFileName: "swgas-albert-taylor.png",
                departmentSharePointUrl: "https://swgas.sharepoint.com/sites/HR",
                defaultViewId: "home",
                views: {
                  home: {
                    label: "Home",
                    embedSrc: "https://app.smartsheet.com/b/publish?EQBCT=7d9f27cd03244d95b758b8093f3a90dd",
                    viewOnlyNote: false,
                    refreshNote: true,
                    preload: true
                  },
                  mainInitiatives: {
                    label: "All HR Projects Dashboard",
                    embedSrc: "https://app.smartsheet.com/b/publish?EQBCT=51b6077469244ea4b04fc5ba07e52876",
                    viewOnlyNote: false,
                    refreshNote: true,
                    preload: true
                  },
                  allDepartmentProjects: {
                    label: "All HR Projects (View Only)",
                    embedSrc: "https://app.smartsheet.com/b/publish?EQBCT=a8c8d9416f8a45079c62e3aefe2d73e4",
                    viewOnlyNote: true,
                    refreshNote: false,
                    preload: true
                  }
                }
              },''',
              'gail-carmona': '''      "gail-carmona": {
                portalType: "leader",
                departmentName: "HR Operations",
                portalTitle: "HR Operations Project Portal",
                projectGroupLabels: [
                  "HRBP",
                  "HR Change Management",
                  "HRSS",
                  "Labor Relations"
                ],
                logoFileName: "swgas-gail-carmona.png",
                departmentSharePointUrl: "https://swgas.sharepoint.com/sites/HR",
                defaultViewId: "home",
                views: {
                  home: {
                    label: "Home",
                    embedSrc: "https://app.smartsheet.com/b/publish?EQBCT=89905a5832ba4935b09e46adb96e5842",
                    viewOnlyNote: false,
                    refreshNote: true,
                    preload: true
                  },
                  mainInitiatives: {
                    label: "HR Operations Main Initiatives",
                    embedSrc: "https://app.smartsheet.com/b/publish?EQBCT=e9aa2f05ffe34f69925a84b306922fc3",
                    viewOnlyNote: false,
                    refreshNote: true,
                    preload: true
                  },
                  allDepartmentProjects: {
                    label: "All HR Operations Projects (View Only)",
                    embedSrc: "https://app.smartsheet.com/b/publish?EQBCT=8dfe65d12d204a36b2380172a8cc9c7b",
                    viewOnlyNote: true,
                    refreshNote: false,
                    preload: true
                  }
                }
              },''',
              'mike-bryant': '''      "mike-bryant": {
                portalType: "leader",
                departmentName: "HR COMP, BEN, & HRS",
                portalTitle: "HR COMP, BEN, & HRS Project Portal",
                projectGroupLabels: [
                  "Benefits",
                  "Compensation",
                  "HRS"
                ],
                logoFileName: "swgas-mike-bryant.png",
                departmentSharePointUrl: "https://swgas.sharepoint.com/sites/HR",
                defaultViewId: "home",
                views: {
                  home: {
                    label: "Home",
                    embedSrc: "https://app.smartsheet.com/b/publish?EQBCT=7c519e87f82b480ab66ec680ab74068c",
                    viewOnlyNote: false,
                    refreshNote: true,
                    preload: true
                  },
                  mainInitiatives: {
                    label: "HR COMP, BEN, & HRS Main Initiatives",
                    embedSrc: "https://app.smartsheet.com/b/publish?EQBCT=7c62e92983d04df4b556b375116110a7",
                    viewOnlyNote: false,
                    refreshNote: true,
                    preload: true
                  },
                  allDepartmentProjects: {
                    label: "All HR COMP, BEN, & HRS Projects (View Only)",
                    embedSrc: "https://app.smartsheet.com/b/publish?EQBCT=b475dcf41ebc4fa6a330e982f1d0fdeb",
                    viewOnlyNote: true,
                    refreshNote: false,
                    preload: true
                  }
                }
              },''',
              'courtney-moore': '''      "courtney-moore": {
                portalType: "leader",
                departmentName: "HR DE&I, EX, & TA",
                portalTitle: "HR DE&I, EX, & TA Project Portal",
                projectGroupLabels: [
                  "DE&I",
                  "Employee Experience",
                  "Talent Acquisition"
                ],
                logoFileName: "swgas-courtney-moore.png",
                departmentSharePointUrl: "https://swgas.sharepoint.com/sites/HR",
                defaultViewId: "home",
                views: {
                  home: {
                    label: "Home",
                    embedSrc: "https://app.smartsheet.com/b/publish?EQBCT=3a13a5699eeb4bc69171db1144cd3ebb",
                    viewOnlyNote: false,
                    refreshNote: true,
                    preload: true
                  },
                  mainInitiatives: {
                    label: "HR DE&I, EX, & TA Main Initiatives",
                    embedSrc: "https://app.smartsheet.com/b/publish?EQBCT=efbcd2919ddf49038b9a653e124ffba8",
                    viewOnlyNote: false,
                    refreshNote: true,
                    preload: true
                  },
                  allDepartmentProjects: {
                    label: "All HR DE&I, EX, & TA Projects (View Only)",
                    embedSrc: "https://app.smartsheet.com/b/publish?EQBCT=bf3834f629ec49d99eb373e5d016138a",
                    viewOnlyNote: true,
                    refreshNote: false,
                    preload: true
                  }
                }
              }'''
          }

          order = ['albert-taylor', 'gail-carmona', 'mike-bryant', 'courtney-moore']
          for index, key in enumerate(order):
              next_key = order[index + 1] if index + 1 < len(order) else None
              start_marker = f'      "{key}": {{'
              start = text.find(start_marker)
              if start < 0:
                  raise RuntimeError(f'Missing configuration for {key}.')

              if next_key:
                  end = text.find(f'      "{next_key}": {{', start)
              else:
                  end = text.find('\n    };', start)

              if end < 0:
                  raise RuntimeError(f'Could not locate the end of {key}.')

              replacement = configs[key] + ('\n\n' if next_key else '')
              text = text[:start] + replacement + text[end:]

          required = [
              '7d9f27cd03244d95b758b8093f3a90dd',
              '51b6077469244ea4b04fc5ba07e52876',
              'a8c8d9416f8a45079c62e3aefe2d73e4',
              '89905a5832ba4935b09e46adb96e5842',
              'e9aa2f05ffe34f69925a84b306922fc3',
              '8dfe65d12d204a36b2380172a8cc9c7b',
              '7c519e87f82b480ab66ec680ab74068c',
              '7c62e92983d04df4b556b375116110a7',
              'b475dcf41ebc4fa6a330e982f1d0fdeb',
              '3a13a5699eeb4bc69171db1144cd3ebb',
              'efbcd2919ddf49038b9a653e124ffba8',
              'bf3834f629ec49d99eb373e5d016138a',
              'const SHOULD_PRELOAD_ACTIVE_PORTAL = !IS_LEADER_PORTAL;',
              'group.openByDefault = shouldAutoLoadGroup;',
              'group.preload = shouldAutoLoadGroup;'
          ]
          for value in required:
              if value not in text:
                  raise RuntimeError(f'Missing required portal value: {value}')

          if 'portal-base.html' in text:
              raise RuntimeError('The loader reference is still present in index.html.')

          destination.write_text(text, encoding='utf-8')

      - name: Commit direct portal restoration
        shell: bash
        run: |
          if [ ! -f .portal-direct-update-trigger ]; then
            echo "No trigger file exists; nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm portal-base.html .portal-direct-update-trigger
          git add index.html
          git commit -m "Restore direct index portal with leader links"
          git push
