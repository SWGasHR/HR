name: Apply department links and leader view preload

on:
  push:
    paths:
      - .portal-department-links-trigger

permissions:
  contents: write

jobs:
  update-portal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update direct index.html
        shell: python
        run: |
          from pathlib import Path
          import re
          import subprocess

          index_path = Path("index.html")
          text = index_path.read_text(encoding="utf-8")

          replacements = {
              "INSERT_BENEFITS_SHAREPOINT_URL_HERE": "https://swgas.sharepoint.com/sites/Benefits",
              "INSERT_BENEFITS_HOME_DASHBOARD_PUBLISHED_LINK_HERE": "https://app.smartsheet.com/b/publish?EQBCT=13971636efc64535bca834c5bd2b499a",
              "INSERT_BENEFITS_MAIN_INITIATIVES_PUBLISHED_LINK_HERE": "https://app.smartsheet.com/b/publish?EQBCT=3d336acb529a47e1bd3701ecd71b22a9",
              "INSERT_BENEFITS_ALL_PROJECTS_PUBLISHED_LINK_HERE": "https://app.smartsheet.com/b/publish?EQBCT=bbb5a5a6a2d9411990d7442a2dfec3ae",

              "INSERT_COMPENSATION_SHAREPOINT_URL_HERE": "https://swgas.sharepoint.com/sites/HR/SitePages/Compensation.aspx",
              "INSERT_COMPENSATION_HOME_DASHBOARD_PUBLISHED_LINK_HERE": "https://app.smartsheet.com/b/publish?EQBCT=75aa0b5581f44af69fe272c372896f9c",
              "INSERT_COMPENSATION_MAIN_INITIATIVES_PUBLISHED_LINK_HERE": "https://app.smartsheet.com/b/publish?EQBCT=8c3f57fa7ffb46b7bc460ea2668df035",
              "INSERT_COMPENSATION_ALL_PROJECTS_PUBLISHED_LINK_HERE": "https://app.smartsheet.com/b/publish?EQBCT=02d933f0f5e74b0598633f7f16834e81",

              "INSERT_DEI_SHAREPOINT_URL_HERE": "https://swgas.sharepoint.com/sites/dei/SitePages/VolunteerCenter.aspx",
              "INSERT_DEI_HOME_DASHBOARD_PUBLISHED_LINK_HERE": "https://app.smartsheet.com/b/publish?EQBCT=c5391d7667514bd9a4b78a04e9ed637a",
              "INSERT_DEI_MAIN_INITIATIVES_PUBLISHED_LINK_HERE": "https://app.smartsheet.com/b/publish?EQBCT=3afa72eb25444f0097fe00081a918a3e",
              "INSERT_DEI_ALL_PROJECTS_PUBLISHED_LINK_HERE": "https://app.smartsheet.com/b/publish?EQBCT=bbebdce23f244f19b0651962b37bfba4",

              "INSERT_EMPLOYEE_EXPERIENCE_SHAREPOINT_URL_HERE": "https://swgas.sharepoint.com/sites/EmployeeExperience",
              "INSERT_EMPLOYEE_EXPERIENCE_HOME_DASHBOARD_PUBLISHED_LINK_HERE": "https://app.smartsheet.com/b/publish?EQBCT=c2275394becf433fa6c4dc3b80c5557a",
              "INSERT_EMPLOYEE_EXPERIENCE_MAIN_INITIATIVES_PUBLISHED_LINK_HERE": "https://app.smartsheet.com/b/publish?EQBCT=ddb74b83300d40c68c638bcad2fcce27",
              "INSERT_EMPLOYEE_EXPERIENCE_ALL_PROJECTS_PUBLISHED_LINK_HERE": "https://app.smartsheet.com/b/publish?EQBCT=9c1f35b775eb43499442dc354f942e29",

              "INSERT_HRBP_SHAREPOINT_URL_HERE": "https://swgas.sharepoint.com/sites/HR/SitePages/HRBP.aspx",
              "INSERT_HRBP_HOME_DASHBOARD_PUBLISHED_LINK_HERE": "https://app.smartsheet.com/b/publish?EQBCT=a08ad990af604a578a070e2fb37bdd5c",
              "INSERT_HRBP_MAIN_INITIATIVES_PUBLISHED_LINK_HERE": "https://app.smartsheet.com/b/publish?EQBCT=1cd7570b643d48beb47669e64a62ddb7",
              "INSERT_HRBP_ALL_PROJECTS_PUBLISHED_LINK_HERE": "https://app.smartsheet.com/b/publish?EQBCT=60c315971bf0434f99c20e0ad7c209ae",

              "INSERT_HRCM_SHAREPOINT_URL_HERE": "https://swgas.sharepoint.com/sites/ocm",
              "INSERT_HRCM_HOME_DASHBOARD_PUBLISHED_LINK_HERE": "https://app.smartsheet.com/b/publish?EQBCT=13f0d7daeeef42d4b67653e8ac8bc300",
              "INSERT_HRCM_MAIN_INITIATIVES_PUBLISHED_LINK_HERE": "https://app.smartsheet.com/b/publish?EQBCT=cc7e27e122784e45a742d2514ecc4eac",
              "INSERT_HRCM_ALL_PROJECTS_PUBLISHED_LINK_HERE": "https://app.smartsheet.com/b/publish?EQBCT=5137b71f2ab4424d97e9409c9a394de3",

              "INSERT_HRS_SHAREPOINT_URL_HERE": "https://swgas.sharepoint.com/sites/HR/SitePages/SWGreat!-Employee-Connect.aspx?source=SiteSettings",
              "INSERT_HRS_HOME_DASHBOARD_PUBLISHED_LINK_HERE": "https://app.smartsheet.com/b/publish?EQBCT=a529d49a8ed54ab6afe2dd735a8a4d83",
              "INSERT_HRS_MAIN_INITIATIVES_PUBLISHED_LINK_HERE": "https://app.smartsheet.com/b/publish?EQBCT=3a44cbb05c4c4f73be39398e26ec1bf9",
              "INSERT_HRS_ALL_PROJECTS_PUBLISHED_LINK_HERE": "https://app.smartsheet.com/b/publish?EQBCT=9ea976219c43416bb036a21079930168",

              "INSERT_HRSS_SHAREPOINT_URL_HERE": "https://swgas.sharepoint.com/sites/HR/SitePages/HRSS%20Homepage.aspx",
              "INSERT_HRSS_HOME_DASHBOARD_PUBLISHED_LINK_HERE": "https://app.smartsheet.com/b/publish?EQBCT=e512f05eca204107b878b7a3a88a9f85",
              "INSERT_HRSS_MAIN_INITIATIVES_PUBLISHED_LINK_HERE": "https://app.smartsheet.com/b/publish?EQBCT=1d47c057552844bfa434594938e0a0af",
              "INSERT_HRSS_ALL_PROJECTS_PUBLISHED_LINK_HERE": "https://app.smartsheet.com/b/publish?EQBCT=1644aa961a924c839a5e664914edc414",

              "INSERT_LABOR_RELATIONS_SHAREPOINT_URL_HERE": "https://swgas.sharepoint.com/sites/HR",
              "INSERT_LABOR_RELATIONS_HOME_DASHBOARD_PUBLISHED_LINK_HERE": "https://app.smartsheet.com/b/publish?EQBCT=3a865e6093644c498ddbba24d76a01d0",
              "INSERT_LABOR_RELATIONS_MAIN_INITIATIVES_PUBLISHED_LINK_HERE": "https://app.smartsheet.com/b/publish?EQBCT=812d155b9f994ffa95c7f6277d8a0019",
              "INSERT_LABOR_RELATIONS_ALL_PROJECTS_PUBLISHED_LINK_HERE": "https://app.smartsheet.com/b/publish?EQBCT=dd446e59894f4f95a4f53d3a7b899281",

              "INSERT_TALENT_ACQUISITION_SHAREPOINT_URL_HERE": "https://swgas.sharepoint.com/sites/HR/SitePages/Talent-Acquisition(1).aspx",
              "INSERT_TALENT_ACQUISITION_HOME_DASHBOARD_PUBLISHED_LINK_HERE": "https://app.smartsheet.com/b/publish?EQBCT=11696a9614634710ac74c0a18d9c0169",
              "INSERT_TALENT_ACQUISITION_MAIN_INITIATIVES_PUBLISHED_LINK_HERE": "https://app.smartsheet.com/b/publish?EQBCT=e2e24d980f244a25b0031bf1b14a57ab",
              "INSERT_TALENT_ACQUISITION_ALL_PROJECTS_PUBLISHED_LINK_HERE": "https://app.smartsheet.com/b/publish?EQBCT=198aafc9244746c0be20502c9a57ad61",

              "INSERT_TALENT_DEVELOPMENT_SHAREPOINT_URL_HERE": "https://swgas.sharepoint.com/sites/TalentDevelopment",
              "INSERT_TALENT_DEVELOPMENT_HOME_DASHBOARD_PUBLISHED_LINK_HERE": "https://app.smartsheet.com/b/publish?EQBCT=ec459cfed1564a51a49c2fa23518775f",
              "INSERT_TALENT_DEVELOPMENT_MAIN_INITIATIVES_PUBLISHED_LINK_HERE": "https://app.smartsheet.com/b/publish?EQBCT=89cb409e94ee40deb85390bc1674dea2",
              "INSERT_TALENT_DEVELOPMENT_ALL_PROJECTS_PUBLISHED_LINK_HERE": "https://app.smartsheet.com/b/publish?EQBCT=38579bee1de54fbeb7823d9e29a4c6bb",
          }

          missing = [placeholder for placeholder in replacements if placeholder not in text]
          if missing:
              raise RuntimeError("Missing expected portal placeholders: " + ", ".join(missing))

          for placeholder, value in replacements.items():
              text = text.replace(placeholder, value)

          old_preload_logic = '''      Only department portals preload their Home, Main Initiatives, and All
                Projects views. A leader's active Home view still loads normally, while
                the remaining leader views wait until they are selected.
              */
              Object.keys(PORTAL_CONFIG.views || {}).forEach(function(viewId) {
                const view = PORTAL_CONFIG.views[viewId];

                if (view && typeof view === "object") {
                  view.preload = SHOULD_PRELOAD_ACTIVE_PORTAL && view.preload === true;
                }
              });'''

          new_preload_logic = '''      Every portal preloads its three primary views: Home, Main Initiatives,
                and All Projects (View Only). HR leader project groups still remain
                collapsed and do not preload any individual project iframe.
              */
              Object.keys(PORTAL_CONFIG.views || {}).forEach(function(viewId) {
                const view = PORTAL_CONFIG.views[viewId];

                if (view && typeof view === "object") {
                  view.preload = view.preload === true;
                }
              });'''

          if old_preload_logic not in text:
              raise RuntimeError("The existing leader view preload block was not found.")

          text = text.replace(old_preload_logic, new_preload_logic, 1)

          for placeholder in replacements:
              if placeholder in text:
                  raise RuntimeError("Portal placeholder remains after replacement: " + placeholder)

          required_logic = [
              "view.preload = view.preload === true;",
              "const shouldAutoLoadGroup = SHOULD_PRELOAD_ACTIVE_PORTAL && isActivePortalGroup;",
              "group.openByDefault = shouldAutoLoadGroup;",
              "group.preload = shouldAutoLoadGroup;"
          ]
          for value in required_logic:
              if value not in text:
                  raise RuntimeError("Required preload behavior is missing: " + value)

          index_path.write_text(text, encoding="utf-8")

          script_dir = Path(".portal-script-checks")
          script_dir.mkdir(exist_ok=True)
          scripts = re.findall(r"<script[^>]*>([\s\S]*?)</script>", text, flags=re.I)
          if not scripts:
              raise RuntimeError("No inline scripts found for validation.")

          for number, script in enumerate(scripts):
              script_path = script_dir / f"script-{number}.js"
              script_path.write_text(script, encoding="utf-8")
              subprocess.run(["node", "--check", str(script_path)], check=True)

      - name: Commit verified portal update and clean one-time files
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -rf .portal-script-checks
          git add index.html
          git rm -f .portal-department-links-trigger
          git rm -f .github/workflows/apply-department-links-and-preload.yml
          if [ -f .github/workflows/restore-direct-index.yml ]; then
            git rm -f .github/workflows/restore-direct-index.yml
          fi
          git commit -m "Add all department links and preload leader views"
          git push
