name: Apply portal label update

on:
  push:
    paths:
      - .github/workflows/apply-portal-label-update.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-portal-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Update leader portal display names
        shell: python
        run: |
          from pathlib import Path

          path = Path("index.html")
          text = path.read_text(encoding="utf-8")

          replacements = {
              'departmentName: "Albert Taylor",': 'departmentName: "HR",',
              'portalTitle: "Albert Taylor Project Portal",': 'portalTitle: "HR Project Portal",',
              'departmentName: "Gail Carmona",': 'departmentName: "HR Operations",',
              'portalTitle: "Gail Carmona Project Portal",': 'portalTitle: "HR Operations Project Portal",',
              'departmentName: "Mike Bryant",': 'departmentName: "HR COMP, BEN, & HRS",',
              'portalTitle: "Mike Bryant Project Portal",': 'portalTitle: "HR COMP, BEN, & HRS Project Portal",',
              'departmentName: "Courtney Moore",': 'departmentName: "HR DE&I, EX, & TA",',
              'portalTitle: "Courtney Moore Project Portal",': 'portalTitle: "HR DE&I, EX, & TA Project Portal",',
              '3. Keep the supplied route folders in the repository so clean URLs work.': '3. Keep 404.html in the repository root so clean URLs and refreshes work.'
          }

          for old, new in replacements.items():
              if old in text:
                  text = text.replace(old, new)
              elif new not in text:
                  raise RuntimeError(f"Expected portal text was not found: {old}")

          required_navigation_names = [
              '>Albert Taylor</a>',
              '>Gail Carmona</a>',
              '>Mike Bryant</a>',
              '>Courtney Moore</a>'
          ]
          for name in required_navigation_names:
              if name not in text:
                  raise RuntimeError(f"HRLT navigation name is missing: {name}")

          path.write_text(text, encoding="utf-8")

      - name: Commit portal update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "Portal labels are already current."
            exit 0
          fi
          git commit -m "Update HR leader portal display names"
          git push
