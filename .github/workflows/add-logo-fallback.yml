name: Add portal logo fallback

on:
  push:
    paths:
      - .github/workflows/add-logo-fallback.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  add-logo-fallback:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add a shared fallback for missing portal logos
        shell: python
        run: |
          from pathlib import Path

          path = Path("index.html")
          text = path.read_text(encoding="utf-8")
          old = '<img id="departmentLogo" src="swgas-benefits.png" alt="Department logo" class="swgas-logo">'
          new = '<img id="departmentLogo" src="swgas-benefits.png" alt="Department logo" class="swgas-logo" onerror="this.onerror=null;this.src=\'/HR/department.png\';">'

          if old in text:
              text = text.replace(old, new, 1)
          elif new not in text:
              raise RuntimeError("Department logo image element was not found.")

          path.write_text(text, encoding="utf-8")

      - name: Commit fallback
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Add fallback for missing portal logos"
          git push
