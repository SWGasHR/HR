name: Finalize Direct HR Portal

on:
  push:
    paths:
      - finalize-direct-index-trigger.txt

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate direct index
        shell: python
        run: |
          from pathlib import Path
          import re
          import subprocess

          source = Path("portal-source.html")
          text = source.read_text(encoding="utf-8")

          text = text.replace('logoFileName: "swgas-', 'logoFileName: "images/swgas-')
          text = text.replace('src="swgas-', 'src="images/swgas-')
          text = text.replace('departmentName: "HR Change Management",', 'departmentName: "HRCM",')
          text = text.replace('portalTitle: "HR Change Management Project Portal",', 'portalTitle: "HRCM Project Portal",')
          text = text.replace('data-department-key="hrcm">HR Change Management</a>', 'data-department-key="hrcm">HRCM</a>')

          old_css = '''    .swgas-logo {
            height: 60px;
            width: auto;
            display: block;
          }'''
          new_css = '''    .swgas-logo {
            height: 60px;
            width: auto;
            max-width: 250px;
            max-height: 60px;
            object-fit: contain;
            display: block;
            transform-origin: center right;
          }

          #departmentLogo[src$="swgas-ex.png"],
          #departmentLogo[src$="swgas-hrbp.png"],
          #departmentLogo[src$="swgas-hrcm.png"],
          #departmentLogo[src$="swgas-hrs.png"],
          #departmentLogo[src$="swgas-hrss.png"],
          #departmentLogo[src$="swgas-labor-relations.png"],
          #departmentLogo[src$="swgas-ta.png"],
          #departmentLogo[src$="swgas-td.png"] {
            transform: scale(1.14);
          }'''

          if old_css not in text:
              raise RuntimeError("Logo CSS block not found")
          text = text.replace(old_css, new_css, 1)

          required = [
              'logoFileName: "images/swgas-ex.png"',
              'departmentName: "HRCM"',
              'portalTitle: "HRCM Project Portal"',
              'view.preload = view.preload === true;',
              'PRELOAD_ACTIVE_VIEW_FALLBACK_MS'
          ]
          for value in required:
              if value not in text:
                  raise RuntimeError(f"Missing required value: {value}")

          Path("index.html").write_text(text, encoding="utf-8")

          scripts = re.findall(r"<script[^>]*>([\s\S]*?)</script>", text, flags=re.I)
          for index, script in enumerate(scripts):
              script_path = Path(f"/tmp/direct-portal-{index}.js")
              script_path.write_text(script, encoding="utf-8")
              subprocess.run(["node", "--check", str(script_path)], check=True)

      - name: Commit direct index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Generate direct self-contained portal index"
          git push
