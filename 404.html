<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>HR Project Portal</title>
  <link rel="icon" type="image/png" href="/HR/department.png">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #f7f8fc;
    }

    .portal-error {
      display: none;
      min-height: 100%;
      place-items: center;
      padding: 28px;
      box-sizing: border-box;
      color: #252763;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="portal-error" id="portalError" role="alert">
    The portal could not be opened. Please refresh the page.
  </div>

  <script>
    (async function () {
      "use strict";

      const portalPolishCss = `
        <style id="portal-polish-overrides">
          .top-nav {
            padding-right: 8px !important;
          }

          .swgas-logo-link {
            position: relative !important;
            display: inline-flex !important;
            align-items: center !important;
            justify-content: center !important;
            height: 54px !important;
            padding: 1px 10px !important;
            margin-left: auto !important;
            margin-right: -2px !important;
            border-radius: 10px !important;
            box-sizing: border-box !important;
            overflow: hidden !important;
            background: transparent !important;
            isolation: isolate;
          }

          .swgas-logo-link::before {
            content: "";
            position: absolute;
            z-index: 0;
            inset: 2px 0;
            border-radius: 8px;
            background: rgba(255,255,255,0.14);
            opacity: 0;
            transition: opacity 0.18s ease;
            pointer-events: none;
          }

          .swgas-logo-link:hover,
          .swgas-logo-link:focus {
            background: transparent !important;
            outline: none;
          }

          .swgas-logo-link:hover::before,
          .swgas-logo-link:focus::before {
            opacity: 1;
          }

          #departmentLogo {
            position: relative;
            z-index: 1;
            width: auto !important;
            height: 50px !important;
            max-width: 250px !important;
            max-height: 50px !important;
            object-fit: contain !important;
          }

          #departmentLogo[src$="swgas-ex.png"],
          #departmentLogo[src$="swgas-hrbp.png"],
          #departmentLogo[src$="swgas-hrcm.png"],
          #departmentLogo[src$="swgas-hrs.png"],
          #departmentLogo[src$="swgas-hrss.png"],
          #departmentLogo[src$="swgas-labor-relations.png"],
          #departmentLogo[src$="swgas-ta.png"],
          #departmentLogo[src$="swgas-td.png"] {
            height: 53px !important;
            max-height: 53px !important;
          }

          /*
            Keep the message bubble in the normal flex layout. When a message
            appears, it reserves its own room and the topic navigation becomes
            scrollable sooner instead of squeezing or covering the bubble.
          */
          #navReminderSlot,
          .top-nav.reminder-visible #navReminderSlot {
            position: relative !important;
            left: auto !important;
            right: auto !important;
            width: clamp(285px, 24vw, 345px) !important;
            min-width: 285px !important;
            max-width: 345px !important;
            flex: 0 0 clamp(285px, 24vw, 345px) !important;
            padding: 0 6px !important;
            margin: 0 !important;
            overflow: visible !important;
            box-sizing: border-box !important;
          }

          #navReminderSlot.collapsed {
            display: none !important;
            width: 0 !important;
            min-width: 0 !important;
            max-width: 0 !important;
            flex: 0 0 0 !important;
            padding: 0 !important;
            overflow: hidden !important;
          }

          .nav-refresh-popover,
          .nav-project-action {
            width: 100% !important;
            max-width: 100% !important;
            min-width: 0 !important;
            box-sizing: border-box !important;
          }

          .nav-refresh-popover {
            min-height: 38px !important;
            max-height: none !important;
            height: auto !important;
            padding: 7px 24px 7px 12px !important;
            flex: 1 1 auto !important;
            white-space: normal !important;
          }

          .nav-refresh-text {
            width: 100% !important;
            white-space: normal !important;
            overflow: visible !important;
            line-height: 1.15 !important;
          }

          .nav-project-action {
            min-height: 42px !important;
            max-height: none !important;
            height: auto !important;
            padding: 6px 32px 6px 8px !important;
            gap: 8px !important;
            flex: 1 1 auto !important;
          }

          .nav-project-action-copy {
            min-width: 0 !important;
            flex: 1 1 auto !important;
            overflow: visible !important;
            white-space: normal !important;
          }

          .nav-project-action-title,
          .nav-project-action-subtitle {
            width: 100% !important;
            overflow: visible !important;
            text-overflow: clip !important;
            white-space: normal !important;
          }

          .nav-project-action-icon {
            width: 29px !important;
            height: 29px !important;
            flex: 0 0 29px !important;
            border-radius: 8px !important;
          }

          .nav-project-action-arrow {
            right: 10px !important;
            width: 17px !important;
            height: 17px !important;
          }

          @media (max-width: 1180px) {
            #navReminderSlot,
            .top-nav.reminder-visible #navReminderSlot {
              width: 270px !important;
              min-width: 270px !important;
              max-width: 270px !important;
              flex-basis: 270px !important;
            }
          }
        </style>`;

      const portalEnhancementScript = `
        <script id="portal-adaptive-navigation">
          (function () {
            "use strict";

            const reminderSlot = document.getElementById("navReminderSlot");
            const navScrollRegion = document.getElementById("navScrollRegion");
            let layoutTimer = null;

            function shortenBlueBarDepartmentName() {
              const blueBarLinks = Array.from(
                document.querySelectorAll(".top-nav .nav-item.portal-view-link")
              );
              const blueBarText = blueBarLinks.map(function(link) {
                return String(link.textContent || "");
              }).join(" ");
              let fullName = "";
              let shortName = "";

              if (blueBarText.includes("Employee Experience")) {
                fullName = "Employee Experience";
                shortName = "EX";
              } else if (blueBarText.includes("Labor Relations")) {
                fullName = "Labor Relations";
                shortName = "LR";
              }

              if (!fullName) {
                return;
              }

              blueBarLinks.forEach(function(link) {
                const currentText = String(link.textContent || "").trim();
                const currentLabel = String(link.getAttribute("aria-label") || "");

                if (currentText.includes(fullName)) {
                  link.textContent = currentText.split(fullName).join(shortName);
                }

                if (currentLabel.includes(fullName)) {
                  link.setAttribute("aria-label", currentLabel.split(fullName).join(shortName));
                }
              });
            }

            function refreshAdaptiveNavigation() {
              clearTimeout(layoutTimer);

              const runRefresh = function() {
                if (typeof updateNavScrollControlsSoon === "function") {
                  updateNavScrollControlsSoon();
                }
              };

              requestAnimationFrame(function() {
                runRefresh();
                layoutTimer = setTimeout(runRefresh, 120);
                setTimeout(runRefresh, 360);
              });
            }

            shortenBlueBarDepartmentName();
            refreshAdaptiveNavigation();

            if (reminderSlot) {
              new MutationObserver(refreshAdaptiveNavigation).observe(reminderSlot, {
                attributes: true,
                attributeFilter: ["class"],
                subtree: true
              });
            }

            window.addEventListener("resize", refreshAdaptiveNavigation);
            window.addEventListener("load", function() {
              shortenBlueBarDepartmentName();
              refreshAdaptiveNavigation();
            });
          })();
        <\/script>`;

      const immediateNavigationCode = `    let portalSwitchInProgress = false;

    function navigateToPortalWithFade(href) {
      if (!href || portalSwitchInProgress) {
        return;
      }

      portalSwitchInProgress = true;
      suppressUnsavedBeforeUnload = true;
      window.location.assign(href);
    }

    function finishPortalArrival() {
      portalSwitchInProgress = false;
      suppressUnsavedBeforeUnload = false;
    }

    window.addEventListener("pageshow", finishPortalArrival);

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", finishPortalArrival, { once: true });
    } else {
      finishPortalArrival();
    }

    function applyDepartmentNavigationLinks() {`;

      const improvedPreloadFunction = `    function startPreloadingEmbeddedLinks(activeRoute) {
      if (preloadStarted) {
        return;
      }

      preloadStarted = true;

      const activeKey = activeRoute ? routeKey(activeRoute) : "";
      const activeIframeRecord = activeKey ? iframeRegistry[activeKey] : null;
      const routesToPreload = getAllEmbeddableRoutes().filter(function(route) {
        const embedData = getEmbedDataForRoute(route);

        return (
          routeKey(route) !== activeKey &&
          embedData &&
          !isPlaceholderLink(embedData.embedSrc)
        );
      });

      let routeIndex = 0;
      let preloadQueueStarted = false;
      let activeViewFallbackTimer = null;

      function preloadNextRoute() {
        if (routeIndex >= routesToPreload.length) {
          return;
        }

        getOrCreateIframeForRoute(routesToPreload[routeIndex]);
        routeIndex += 1;
        setTimeout(preloadNextRoute, PRELOAD_STAGGER_MS);
      }

      function beginPreloadQueue() {
        if (preloadQueueStarted) {
          return;
        }

        preloadQueueStarted = true;

        if (activeViewFallbackTimer) {
          clearTimeout(activeViewFallbackTimer);
          activeViewFallbackTimer = null;
        }

        setTimeout(preloadNextRoute, PRELOAD_START_DELAY_MS);
      }

      if (!activeIframeRecord || activeIframeRecord.isLoaded) {
        beginPreloadQueue();
        return;
      }

      activeIframeRecord.frame.addEventListener("load", beginPreloadQueue, { once: true });
      activeViewFallbackTimer = setTimeout(beginPreloadQueue, PRELOAD_ACTIVE_VIEW_FALLBACK_MS);
    }

`;

      try {
        const response = await fetch("/HR/portal.html?v=20260624-7", { cache: "no-store" });

        if (!response.ok) {
          throw new Error("The portal content could not be loaded.");
        }

        let html = await response.text();

        html = html.replaceAll('logoFileName: "swgas-', 'logoFileName: "images/swgas-');
        html = html.replaceAll('src="swgas-', 'src="images/swgas-');
        html = html.replaceAll('embedSrc: "INSERT_LINK_HERE", visible: true', 'embedSrc: "INSERT_LINK_HERE", visible: false');
        html = html.replaceAll("HR Change Management", "HRCM");
        html = html.replaceAll("link.href = buildDepartmentPortalHref(configuredKey);", "link.href = buildDepartmentPortalLoadHref(configuredKey);");

        html = html.replace(
          'const PRELOAD_START_DELAY_MS = 900;\n    const PRELOAD_STAGGER_MS = 250;',
          'const PRELOAD_START_DELAY_MS = 650;\n    const PRELOAD_ACTIVE_VIEW_FALLBACK_MS = 10000;\n    const PRELOAD_STAGGER_MS = 1200;'
        );

        html = html.replace(
          /\/\* --- SINGLE-REPOSITORY PORTAL SWITCH TRANSITION --- \*\/[\s\S]*?<\/style>/,
          '.portal-nav-hidden, .portal-nav-separator-hidden { display: none !important; }\n  </style>'
        );

        html = html.replace(
          /\n  <script>\n    \/\* Apply the fallback arrival state before the portal chrome is parsed\. \*\/[\s\S]*?<\/script>\n/,
          '\n'
        );

        html = html.replace(
          /    const PORTAL_SWITCH_FALLBACK_MS = 175;[\s\S]*?    function applyDepartmentNavigationLinks\(\) \{/,
          immediateNavigationCode
        );

        html = html.replace(
          /    function startPreloadingEmbeddedLinks\(activeRoute\) \{[\s\S]*?\n    \}\n\n    function notePossibleIframeInteraction/,
          improvedPreloadFunction + "    function notePossibleIframeInteraction"
        );

        html = html.replace("</head>", portalPolishCss + "\n</head>");
        html = html.replace("</body>", portalEnhancementScript + "\n</body>");

        if (
          !html.includes('images/swgas-benefits.png') ||
          !html.includes('departmentName: "HRCM"') ||
          !html.includes("portal-adaptive-navigation") ||
          html.includes("portal-switching") ||
          html.includes("@view-transition")
        ) {
          throw new Error("The portal content did not initialize correctly.");
        }

        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        console.error(error);
        const errorMessage = document.getElementById("portalError");
        if (errorMessage) {
          errorMessage.style.display = "grid";
        }
      }
    })();
  </script>
</body>
</html>
