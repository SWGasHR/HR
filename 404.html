<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Opening HR Project Portal…</title>
  <link rel="icon" type="image/png" href="/HR/department.png">
  <style>
    html, body { height: 100%; margin: 0; }
    body { display: grid; place-items: center; background: #252763; color: #fff; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; }
    .portal-loading { text-align: center; padding: 28px; }
    .portal-loading strong { display: block; margin-bottom: 7px; font-size: 20px; }
    .portal-loading span { color: rgba(255,255,255,.78); font-size: 14px; }
  </style>
</head>
<body>
  <div class="portal-loading" role="status" aria-live="polite">
    <strong>Opening the HR Project Portal</strong>
    <span>Loading the portal…</span>
  </div>
  <script>
    (async function () {
      "use strict";

      const laterLogoCss = `
        <style id="portal-logo-size-fix">
          #departmentLogo {
            width: auto !important;
            height: 60px !important;
            max-width: 250px !important;
            max-height: 60px !important;
            object-fit: contain !important;
            transform-origin: center right;
          }
          #departmentLogo[src$="swgas-ex.png"],
          #departmentLogo[src$="swgas-hrbp.png"],
          #departmentLogo[src$="swgas-hrcm.png"],
          #departmentLogo[src$="swgas-hrs.png"],
          #departmentLogo[src$="swgas-hrss.png"],
          #departmentLogo[src$="swgas-labor-relations.png"],
          #departmentLogo[src$="swgas-ta.png"],
          #departmentLogo[src$="swgas-td.png"] {
            transform: scale(1.14);
          }
        </style>`;

      const improvedPreloadFunction = `    function startPreloadingEmbeddedLinks(activeRoute) {
      if (preloadStarted) {
        return;
      }

      preloadStarted = true;

      const activeKey = activeRoute ? routeKey(activeRoute) : "";
      const activeIframeRecord = activeKey ? iframeRegistry[activeKey] : null;
      const routesToPreload = getAllEmbeddableRoutes().filter(function(route) {
        const embedData = getEmbedDataForRoute(route);

        return (
          routeKey(route) !== activeKey &&
          embedData &&
          !isPlaceholderLink(embedData.embedSrc)
        );
      });

      let routeIndex = 0;
      let preloadQueueStarted = false;
      let activeViewFallbackTimer = null;

      function preloadNextRoute() {
        if (routeIndex >= routesToPreload.length) {
          return;
        }

        getOrCreateIframeForRoute(routesToPreload[routeIndex]);
        routeIndex += 1;
        setTimeout(preloadNextRoute, PRELOAD_STAGGER_MS);
      }

      function beginPreloadQueue() {
        if (preloadQueueStarted) {
          return;
        }

        preloadQueueStarted = true;

        if (activeViewFallbackTimer) {
          clearTimeout(activeViewFallbackTimer);
          activeViewFallbackTimer = null;
        }

        setTimeout(preloadNextRoute, PRELOAD_START_DELAY_MS);
      }

      if (!activeIframeRecord || activeIframeRecord.isLoaded) {
        beginPreloadQueue();
        return;
      }

      activeIframeRecord.frame.addEventListener("load", beginPreloadQueue, { once: true });
      activeViewFallbackTimer = setTimeout(beginPreloadQueue, PRELOAD_ACTIVE_VIEW_FALLBACK_MS);
    }

`;

      try {
        const response = await fetch("/HR/images/portal.html?v=20260624-3", { cache: "no-store" });
        if (!response.ok) {
          throw new Error("The portal content could not be loaded.");
        }

        let html = await response.text();

        html = html.replaceAll('logoFileName: "swgas-', 'logoFileName: "images/swgas-');
        html = html.replaceAll('src="swgas-', 'src="images/swgas-');
        html = html.replaceAll('embedSrc: "INSERT_LINK_HERE", visible: true', 'embedSrc: "INSERT_LINK_HERE", visible: false');
        html = html.replaceAll('HR Change Management', 'HRCM');

        html = html.replace(
          'const PRELOAD_START_DELAY_MS = 900;\n    const PRELOAD_STAGGER_MS = 250;',
          'const PRELOAD_START_DELAY_MS = 650;\n    const PRELOAD_ACTIVE_VIEW_FALLBACK_MS = 10000;\n    const PRELOAD_STAGGER_MS = 1200;'
        );

        html = html.replace(
          /    function startPreloadingEmbeddedLinks\(activeRoute\) \{[\s\S]*?\n    \}\n\n    function notePossibleIframeInteraction/,
          improvedPreloadFunction + '    function notePossibleIframeInteraction'
        );

        html = html.replace('</head>', laterLogoCss + '\n</head>');

        if (!html.includes('images/swgas-benefits.png') || !html.includes('departmentName: "HRCM"')) {
          throw new Error("The portal content did not initialize correctly.");
        }

        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        console.error(error);
        document.body.innerHTML = '<div class="portal-loading"><strong>The portal could not be opened.</strong><span>Please refresh the page or contact the portal owner.</span></div>';
      }
    })();
  </script>
</body>
</html>
