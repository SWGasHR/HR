<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>HR Project Portal</title>
  <link rel="icon" type="image/png" href="/HR/department.png">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #f7f8fc;
    }

    .portal-error {
      display: none;
      min-height: 100%;
      place-items: center;
      padding: 28px;
      box-sizing: border-box;
      color: #252763;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="portal-error" id="portalError" role="alert">
    The portal could not be opened. Please refresh the page.
  </div>

  <script>
    /*
      LOADER for the HR Project Portal.

      This file — and its identical twin 404.html — fetches the real portal
      markup from portal.html and renders it in place. That lets every
      department and leader share ONE source file (portal.html) while clean
      URLs keep working on GitHub Pages (GitHub serves 404.html for any path
      that is not a real file, and this loader renders the portal there too).

      portal.html is the single source of truth — edit it directly. There are
      no runtime patches anymore; what you put in portal.html is what ships.

      WHEN YOU EDIT portal.html: bump the ?v= number in PORTAL_URL below.
      Between version bumps the browser caches portal.html, so revisiting and
      switching departments is fast and does not re-download the whole portal.
      Changing ?v= makes every browser fetch the fresh copy on the next load.
    */
    (async function () {
      "use strict";

      const PORTAL_URL = "/HR/portal.html?v=20260625-6";

      try {
        const response = await fetch(PORTAL_URL);

        if (!response.ok) {
          throw new Error("The portal content could not be loaded (" + response.status + ").");
        }

        const html = await response.text();

        // Basic sanity check that we received the real portal and not, for
        // example, an error page returned with a 200 status.
        if (!html.includes("departmentName:") || !html.includes("</html>")) {
          throw new Error("The portal content did not look valid.");
        }

        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        console.error(error);
        const errorMessage = document.getElementById("portalError");
        if (errorMessage) {
          errorMessage.style.display = "grid";
        }
      }
    })();
  </script>
</body>
</html>
