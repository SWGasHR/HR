<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>HR Project Portal</title>
  <link rel="icon" type="image/png" href="/HR/department.png">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      background: #f7f8fc;
    }

    .portal-error {
      display: none;
      min-height: 100%;
      place-items: center;
      padding: 28px;
      box-sizing: border-box;
      color: #252763;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="portal-error" id="portalError" role="alert">
    The portal could not be opened. Please refresh the page.
  </div>

  <script>
    (async function () {
      "use strict";

      const portalPolishCss = `
        <style id="portal-polish-overrides">
          .top-nav {
            padding-right: 8px !important;
          }

          .swgas-logo-link {
            position: relative !important;
            display: inline-flex !important;
            align-items: center !important;
            justify-content: center !important;
            height: 54px !important;
            padding: 1px 10px !important;
            margin-left: auto !important;
            margin-right: -2px !important;
            border-radius: 10px !important;
            box-sizing: border-box !important;
            overflow: hidden !important;
            background: transparent !important;
            isolation: isolate;
          }

          .swgas-logo-link::before {
            content: "";
            position: absolute;
            z-index: 0;
            inset: 2px 0;
            border-radius: 8px;
            background: rgba(255,255,255,0.14);
            opacity: 0;
            transition: opacity 0.18s ease;
            pointer-events: none;
          }

          .swgas-logo-link:hover,
          .swgas-logo-link:focus {
            background: transparent !important;
            outline: none;
          }

          .swgas-logo-link:hover::before,
          .swgas-logo-link:focus::before {
            opacity: 1;
          }

          #departmentLogo {
            position: relative;
            z-index: 1;
            width: auto !important;
            height: 50px !important;
            max-width: 250px !important;
            max-height: 50px !important;
            object-fit: contain !important;
          }

          #departmentLogo[src$="swgas-ex.png"],
          #departmentLogo[src$="swgas-hrbp.png"],
          #departmentLogo[src$="swgas-hrcm.png"],
          #departmentLogo[src$="swgas-hrs.png"],
          #departmentLogo[src$="swgas-hrss.png"],
          #departmentLogo[src$="swgas-labor-relations.png"],
          #departmentLogo[src$="swgas-ta.png"],
          #departmentLogo[src$="swgas-td.png"] {
            height: 53px !important;
            max-height: 53px !important;
          }

          .nav-reminder-slot,
          .top-nav.reminder-visible .nav-reminder-slot {
            min-width: 0 !important;
            max-width: none !important;
            padding: 0 !important;
            overflow: visible !important;
          }

          .nav-refresh-popover {
            width: auto !important;
            max-width: 100% !important;
            min-width: 0 !important;
            min-height: 38px !important;
            height: auto !important;
            padding: 8px 30px 8px 16px !important;
            flex: 0 0 auto !important;
            white-space: nowrap !important;
          }

          .nav-refresh-text {
            width: auto !important;
            white-space: nowrap !important;
          }

          .nav-project-action {
            width: auto !important;
            max-width: 100% !important;
            min-width: 0 !important;
            min-height: 40px !important;
            height: auto !important;
            padding: 8px 36px 8px 12px !important;
            gap: 8px !important;
            flex: 0 0 auto !important;
          }

          .nav-project-action-copy {
            flex: 0 1 auto !important;
            overflow: visible !important;
          }

          .nav-project-action-icon {
            width: 29px !important;
            height: 29px !important;
            flex: 0 0 29px !important;
            border-radius: 8px !important;
          }

          .nav-project-action-arrow {
            right: 10px !important;
            width: 17px !important;
            height: 17px !important;
          }

          .top-nav .nav-home,
          .top-nav .nav-scroll-shell,
          .top-nav .nav-reminder-slot,
          .top-nav .swgas-logo-link {
            opacity: 1;
            transform: translateY(0);
            transition:
              opacity 0.17s ease,
              transform 0.20s cubic-bezier(0.22, 1, 0.36, 1);
            will-change: opacity, transform;
          }

          .top-nav .nav-scroll-shell {
            transition-delay: 0.015s;
          }

          .top-nav .nav-reminder-slot {
            transition-delay: 0.03s;
          }

          .top-nav .swgas-logo-link {
            transition-delay: 0.045s;
          }

          body.portal-topbar-arriving .top-nav .nav-home,
          body.portal-topbar-arriving .top-nav .nav-scroll-shell,
          body.portal-topbar-arriving .top-nav .nav-reminder-slot,
          body.portal-topbar-arriving .top-nav .swgas-logo-link {
            opacity: 0;
            transform: translateY(-7px);
          }

          body.portal-topbar-leaving .top-nav .nav-home,
          body.portal-topbar-leaving .top-nav .nav-scroll-shell,
          body.portal-topbar-leaving .top-nav .nav-reminder-slot,
          body.portal-topbar-leaving .top-nav .swgas-logo-link {
            opacity: 0;
            transform: translateY(-7px);
            transition-delay: 0s !important;
          }

          @media (prefers-reduced-motion: reduce) {
            .top-nav .nav-home,
            .top-nav .nav-scroll-shell,
            .top-nav .nav-reminder-slot,
            .top-nav .swgas-logo-link {
              transition: none !important;
            }
          }
        </style>`;

      const portalEnhancementScript = `
        <script id="portal-navigation-alignment">
          (function () {
            "use strict";

            function alignReminderSlot() {
              const topNav = document.querySelector(".top-nav");
              const reminderSlot = document.getElementById("navReminderSlot");
              const logoLink = document.getElementById("departmentSharePointLink");
              const supportDropdown = Array.from(document.querySelectorAll(".dropdown")).find(function(dropdown) {
                const toggle = dropdown.querySelector(".dropdown-toggle");
                return toggle && toggle.textContent.trim().startsWith("Support");
              });

              if (!topNav || !reminderSlot || !logoLink || !supportDropdown) {
                return;
              }

              const navRect = topNav.getBoundingClientRect();
              const supportRect = supportDropdown.getBoundingClientRect();
              const logoRect = logoLink.getBoundingClientRect();
              const gap = 6;

              reminderSlot.style.position = "absolute";
              reminderSlot.style.left = Math.max(0, supportRect.right - navRect.left + gap) + "px";
              reminderSlot.style.right = Math.max(0, navRect.right - logoRect.left + gap) + "px";
              reminderSlot.style.width = "auto";
              reminderSlot.style.padding = "0";
              reminderSlot.style.margin = "0";
              reminderSlot.style.justifyItems = "center";
              reminderSlot.style.alignItems = "center";
              reminderSlot.style.zIndex = "25";
              reminderSlot.style.display = reminderSlot.classList.contains("collapsed") ? "none" : "grid";
            }

            function revealTopBar() {
              requestAnimationFrame(function () {
                requestAnimationFrame(function () {
                  document.body.classList.remove("portal-topbar-arriving");
                });
              });
            }

            const reminderSlot = document.getElementById("navReminderSlot");
            if (reminderSlot) {
              new MutationObserver(alignReminderSlot).observe(reminderSlot, {
                attributes: true,
                attributeFilter: ["class"],
                subtree: true
              });
            }

            window.addEventListener("resize", alignReminderSlot);
            window.addEventListener("load", alignReminderSlot);
            revealTopBar();
            requestAnimationFrame(alignReminderSlot);
            setTimeout(alignReminderSlot, 100);
            setTimeout(alignReminderSlot, 500);
          })();
        <\/script>`;

      const immediateNavigationCode = `    let portalSwitchInProgress = false;
    const PORTAL_TOPBAR_TRANSITION_MS = 190;

    function navigateToPortalWithFade(href) {
      if (!href || portalSwitchInProgress) {
        return;
      }

      portalSwitchInProgress = true;
      suppressUnsavedBeforeUnload = true;

      const reduceMotion = window.matchMedia &&
        window.matchMedia("(prefers-reduced-motion: reduce)").matches;

      if (reduceMotion) {
        window.location.assign(href);
        return;
      }

      document.body.classList.remove("portal-topbar-arriving");
      document.body.classList.add("portal-topbar-leaving");

      setTimeout(function () {
        window.location.assign(href);
      }, PORTAL_TOPBAR_TRANSITION_MS);
    }

    function finishPortalArrival() {
      portalSwitchInProgress = false;
      suppressUnsavedBeforeUnload = false;
      document.body.classList.remove("portal-topbar-leaving");
    }

    window.addEventListener("pageshow", finishPortalArrival);

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", finishPortalArrival, { once: true });
    } else {
      finishPortalArrival();
    }

    function applyDepartmentNavigationLinks() {`;

      const improvedPreloadFunction = `    function startPreloadingEmbeddedLinks(activeRoute) {
      if (preloadStarted) {
        return;
      }

      preloadStarted = true;

      const activeKey = activeRoute ? routeKey(activeRoute) : "";
      const activeIframeRecord = activeKey ? iframeRegistry[activeKey] : null;
      const routesToPreload = getAllEmbeddableRoutes().filter(function(route) {
        const embedData = getEmbedDataForRoute(route);

        return (
          routeKey(route) !== activeKey &&
          embedData &&
          !isPlaceholderLink(embedData.embedSrc)
        );
      });

      let routeIndex = 0;
      let preloadQueueStarted = false;
      let activeViewFallbackTimer = null;

      function preloadNextRoute() {
        if (routeIndex >= routesToPreload.length) {
          return;
        }

        getOrCreateIframeForRoute(routesToPreload[routeIndex]);
        routeIndex += 1;
        setTimeout(preloadNextRoute, PRELOAD_STAGGER_MS);
      }

      function beginPreloadQueue() {
        if (preloadQueueStarted) {
          return;
        }

        preloadQueueStarted = true;

        if (activeViewFallbackTimer) {
          clearTimeout(activeViewFallbackTimer);
          activeViewFallbackTimer = null;
        }

        setTimeout(preloadNextRoute, PRELOAD_START_DELAY_MS);
      }

      if (!activeIframeRecord || activeIframeRecord.isLoaded) {
        beginPreloadQueue();
        return;
      }

      activeIframeRecord.frame.addEventListener("load", beginPreloadQueue, { once: true });
      activeViewFallbackTimer = setTimeout(beginPreloadQueue, PRELOAD_ACTIVE_VIEW_FALLBACK_MS);
    }

`;

      try {
        const response = await fetch("/HR/portal.html?v=20260624-7", { cache: "no-store" });

        if (!response.ok) {
          throw new Error("The portal content could not be loaded.");
        }

        let html = await response.text();

        html = html.replaceAll('logoFileName: "swgas-', 'logoFileName: "images/swgas-');
        html = html.replaceAll('src="swgas-', 'src="images/swgas-');
        html = html.replaceAll('embedSrc: "INSERT_LINK_HERE", visible: true', 'embedSrc: "INSERT_LINK_HERE", visible: false');
        html = html.replaceAll("HR Change Management", "HRCM");
        html = html.replaceAll("link.href = buildDepartmentPortalHref(configuredKey);", "link.href = buildDepartmentPortalLoadHref(configuredKey);");

        html = html.replace(
          'const PRELOAD_START_DELAY_MS = 900;\n    const PRELOAD_STAGGER_MS = 250;',
          'const PRELOAD_START_DELAY_MS = 650;\n    const PRELOAD_ACTIVE_VIEW_FALLBACK_MS = 10000;\n    const PRELOAD_STAGGER_MS = 1200;'
        );

        html = html.replace(
          /\/\* --- SINGLE-REPOSITORY PORTAL SWITCH TRANSITION --- \*\/[\s\S]*?<\/style>/,
          '.portal-nav-hidden, .portal-nav-separator-hidden { display: none !important; }\n  </style>'
        );

        html = html.replace(
          /\n  <script>\n    \/\* Apply the fallback arrival state before the portal chrome is parsed\. \*\/[\s\S]*?<\/script>\n/,
          '\n'
        );

        html = html.replace(
          /    const PORTAL_SWITCH_FALLBACK_MS = 175;[\s\S]*?    function applyDepartmentNavigationLinks\(\) \{/,
          immediateNavigationCode
        );

        html = html.replace(
          /    function startPreloadingEmbeddedLinks\(activeRoute\) \{[\s\S]*?\n    \}\n\n    function notePossibleIframeInteraction/,
          improvedPreloadFunction + "    function notePossibleIframeInteraction"
        );

        html = html.replace("</head>", portalPolishCss + "\n</head>");
        html = html.replace(/<body([^>]*)>/i, function(match, attributes) {
          const normalizedAttributes = String(attributes || "");
          if (/\bclass=/i.test(normalizedAttributes)) {
            return match.replace(/class=(['"])(.*?)\1/i, function(classMatch, quote, classNames) {
              return "class=" + quote + classNames + " portal-topbar-arriving" + quote;
            });
          }
          return "<body" + normalizedAttributes + ' class="portal-topbar-arriving">';
        });
        html = html.replace("</body>", portalEnhancementScript + "\n</body>");

        if (
          !html.includes('images/swgas-benefits.png') ||
          !html.includes('departmentName: "HRCM"') ||
          !html.includes("portal-navigation-alignment") ||
          html.includes("portal-switching") ||
          html.includes("@view-transition") ||
          !html.includes("portal-topbar-arriving") ||
          !html.includes("portal-topbar-leaving")
        ) {
          throw new Error("The portal content did not initialize correctly.");
        }

        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        console.error(error);
        const errorMessage = document.getElementById("portalError");
        if (errorMessage) {
          errorMessage.style.display = "grid";
        }
      }
    })();
  </script>
</body>
</html>
